<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>骨架采集与回放</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>人体骨架 · 采集与回放</h1>
    <p class="sub">上传视频采集 → JSON 与配套视频默认存入 localdata · 回放自动加载关联视频</p>
  </header>

  <nav class="tabs">
    <button type="button" class="tab active" data-tab="collect">采集</button>
    <button type="button" class="tab" data-tab="annotate">标注</button>
    <button type="button" class="tab" data-tab="playback">回放</button>
  </nav>

  <main>
    <section id="panel-collect" class="panel active">
      <form id="collect-form" class="card">
        <label>
          <span class="label-with-tip">视频文件
            <button type="button" class="field-tip" data-tip="选择待采集的源视频，将按下方推理参数提取人体骨架并写入 JSON。">?</button>
          </span>
          <input type="file" id="collect-file" accept="video/*" required />
        </label>
        <div class="row">
          <label>
            <span class="label-with-tip">姿态（models.backend）
              <button type="button" class="field-tip" data-tip="RTMPose 模型档位：t 最快、s 均衡、m 更准。影响推理速度与关键点精度。">?</button>
            </span>
            <select id="collect-backend">
              <option value="rtmpose_t">rtmpose_t</option>
              <option value="rtmpose_s">rtmpose_s</option>
              <option value="rtmpose_m">rtmpose_m</option>
            </select>
          </label>
          <label>
            <span class="label-with-tip">检测（models.det_variant）
              <button type="button" class="field-tip" data-tip="人体检测档。推荐 m（RTMDet-m 640），与 box_human_det 同级。官方 ONNX 仅提供 t/m，选 s/l 会自动回退。">?</button>
            </span>
            <select id="collect-det">
              <option value="t">rtmdet_t · nano 320</option>
              <option value="m" selected>rtmdet_m · 640（推荐仓库场景）</option>
              <option value="s">rtmdet_s · 回退 nano</option>
              <option value="l">rtmdet_l · 回退 m</option>
            </select>
          </label>
        </div>
        <div class="row">
          <label>
            <span class="label-with-tip">推理宽
              <button type="button" class="field-tip" data-tip="inference 输入宽度。0 表示按「推理高」等比自动计算（与 visual-dps 一致）。宽高都填则强制固定尺寸。">?</button>
            </span>
            <input type="number" id="collect-width" value="0" min="0" />
          </label>
          <label>
            <span class="label-with-tip">推理高（inference.height）
              <button type="button" class="field-tip" data-tip="inference 输入高度。0 表示不缩放；只填高（如 480）时宽按源视频比例计算且不放大。">?</button>
            </span>
            <input type="number" id="collect-height" value="480" min="0" />
          </label>
        </div>
        <div class="field-block">
          <label for="collect-fps" class="label-with-tip">frame_rate（inference.frame_rate）
            <button type="button" class="field-tip" data-tip="采集时每秒最多推理多少帧（节拍上限，不是视频 FPS）。0=尽快处理完；15≈每帧间隔 1/15 秒，接近实时预览负载（与 visual-dps / box_human_det 一致）。">?</button>
          </label>
          <input type="number" id="collect-fps" value="0" min="0" step="1" />
        </div>
        <div class="row">
          <label>
            <span class="label-with-tip">pose_frame_interval
              <button type="button" class="field-tip" data-tip="每隔 N 帧做一次姿态推理。1 表示每帧都推理；增大可加快采集、降低帧密度。">?</button>
            </span>
            <input type="number" id="collect-interval" value="1" min="1" />
          </label>
          <label>
            <span class="label-with-tip">max_pose_frames
              <button type="button" class="field-tip" data-tip="最多写入多少帧骨架到 JSON。0 表示不限制，处理完整视频。">?</button>
            </span>
            <input type="number" id="collect-max" value="0" min="0" />
          </label>
        </div>
        <label class="toggle-row">
          <input type="checkbox" id="collect-save-video" checked />
          <span class="label-with-tip">保存配套视频至 <code>localdata/video</code>
            <button type="button" class="field-tip" data-tip="默认开启：将源视频副本与骨架 JSON 同一记录关联保存，便于回放页加载。">?</button>
          </span>
        </label>
        <label class="field-block">
          <span class="label-with-tip">机位标识（与画面右下角一致，如 2-1组-3）
            <button type="button" class="field-tip" data-tip="手动输入视频画面上的机位文字，须与仓库根目录 reflection.json 中 camera 字段一致。将按 reflection 装配 localdata/json/annotations/{编号}.json。也可上传标注 JSON 或使用标注页按视频主名保存。">?</button>
          </span>
          <input type="text" id="collect-camera-label" list="collect-camera-datalist" placeholder="例如 2-1组-3" autocomplete="off" />
          <datalist id="collect-camera-datalist"></datalist>
        </label>
        <p id="collect-camera-status" class="annotation-status hint hidden" role="status"></p>
        <div id="collect-preview-wrap" class="collect-preview-wrap hidden">
          <p class="hint collect-preview-hint">视频首帧预览（对照画面右下角机位标识填写上方输入框）</p>
          <div class="collect-preview-stage">
            <video id="collect-preview-video" class="collect-preview-video" playsinline muted preload="metadata"></video>
          </div>
        </div>
        <label>
          <span class="label-with-tip">标注 JSON（必填其一：机位标识 / 本地上传 / 标注页已保存）
            <button type="button" class="field-tip" data-tip="优先：填写机位标识并按 reflection 匹配；或上传 JSON；或检查 localdata/json/annotations/{视频主名}.json。">?</button>
          </span>
          <input type="file" id="collect-annotation" accept=".json,application/json" />
        </label>
        <p id="collect-annotation-status" class="annotation-status hint hidden" role="status"></p>
        <fieldset class="collision-config">
          <legend class="legend-with-tip">碰撞检测（inference，与 visual-dps 一致）
            <button type="button" class="field-tip" data-tip="瞬时碰撞：手腕（COCO 9/10）score>0.3 进入货框 → collisions；连续命中且过冷却 → alarm_collisions。默认来自 config.json；回放补算也用此处参数。">?</button>
          </legend>
          <div class="row">
            <label>
              <span class="label-with-tip">alarm_min_consecutive_frames
                <button type="button" class="field-tip" data-tip="手腕在货框内连续命中达到该帧数后，才触发告警（alarm）。">?</button>
              </span>
              <input type="number" id="collect-alarm-min" value="3" min="1" step="1" />
            </label>
            <label>
              <span class="label-with-tip">alarm_cooldown_frames
                <button type="button" class="field-tip" data-tip="同一货框两次告警之间的最小帧间隔，用于抑制重复告警。">?</button>
              </span>
              <input type="number" id="collect-alarm-cooldown" value="6" min="1" step="1" />
            </label>
          </div>
        </fieldset>
        <button type="submit" id="collect-btn">开始采集</button>
      </form>
      <div id="collect-status" class="status hidden"></div>
      <div id="collect-result" class="card hidden"></div>
      <p class="inline-tip-row collect-records-hint">
        <button type="button" class="field-tip" data-tip="已保存记录的下载、标注与删除请到「回放」页；骨架回放也在该页。">?</button>
        <span>记录管理与回放见「回放」页</span>
      </p>
    </section>

    <section id="panel-annotate" class="panel">
      <div class="card">
        <div class="row">
          <label>
            <span class="label-with-tip">video_stem（视频主名）
              <button type="button" class="field-tip" data-tip="与视频文件名主名一致，用于关联 annotations/{主名}.json。同一主名仅保留最新一份标注。">?</button>
            </span>
            <input type="text" id="annotate-stem" placeholder="与视频文件名主名一致" />
          </label>
        </div>
        <div class="annotate-actions">
          <label class="inline-file">
            <span class="label-with-tip">本地视频
              <button type="button" class="field-tip" data-tip="选择本地视频以提取首帧到画布；也可在采集页已存记录的场景下仅填 video_stem 后从服务端取帧。">?</button>
            </span>
            <input type="file" id="annotate-video" accept="video/*" />
          </label>
          <span class="label-with-tip">
            <button type="button" id="annotate-load-frame">加载首帧</button>
            <button type="button" class="field-tip" data-tip="将视频第一帧绘制到画布，用于标定货架透视与货位。需先选择本地视频或填写 video_stem。">?</button>
          </span>
          <label class="inline-file">
            <span class="label-with-tip">上传 JSON 覆盖
              <button type="button" class="field-tip" data-tip="从本机加载已有标注 JSON 覆盖当前编辑内容（保存前不会写盘）。">?</button>
            </span>
            <input type="file" id="annotate-json-upload" accept=".json,application/json" />
          </label>
        </div>
        <div class="row annotate-grid-size">
          <label>
            <span class="label-with-tip">网格行数
              <button type="button" class="field-tip" data-tip="货架透视网格行数（1–8）。拖动绿色角点对齐货架后，点「生成货位」按行列切分。">?</button>
            </span>
            <input type="number" id="annotate-rows" value="4" min="1" max="8" />
          </label>
          <label>
            <span class="label-with-tip">网格列数
              <button type="button" class="field-tip" data-tip="货架透视网格列数（1–8）。">?</button>
            </span>
            <input type="number" id="annotate-cols" value="4" min="1" max="8" />
          </label>
          <span class="label-with-tip">
            <button type="button" id="annotate-confirm-grid" class="primary-btn">生成货位</button>
            <button type="button" class="field-tip" data-tip="与 visual-dps 一致：根据四角透视网格生成货位四边形，之后可拖橙色角点或平移货位。">?</button>
          </span>
        </div>
        <div id="annotate-cell-panel" class="annotate-cell-panel hidden">
          <span class="hint" id="annotate-cell-pos">—</span>
          <label class="field">
            <span class="label-with-tip">货位编号
              <button type="button" class="field-tip" data-tip="当前选中货位的业务编号，保存进 JSON；留空则按行列默认编号。">?</button>
            </span>
            <input type="text" id="annotate-box-id" placeholder="默认按行列编号" />
          </label>
          <button type="button" id="annotate-delete-cell" class="danger-btn">删除货位</button>
        </div>
        <div class="annotate-actions">
          <button type="button" id="annotate-save" class="primary-btn">保存标注（覆盖）</button>
          <button type="button" id="annotate-restart">重置货架</button>
          <button type="button" id="annotate-download">下载当前 JSON</button>
        </div>
      </div>
      <div id="annotate-status" class="status annotate-status-bar hidden" role="status" aria-live="polite"></div>
      <div id="annotate-verify" class="annotate-verify hidden" role="alert"></div>
      <div class="annotate-stage">
        <canvas id="annotate-canvas" class="hidden"></canvas>
        <p class="annotate-stage-hint">
          <span class="hint">画布</span>
          <button type="button" class="field-tip" data-tip="步骤：① 加载首帧 → ② 生成货位并对照 → ③ 拖绿色/橙色角点或平移货位 → ④ 保存。交互与现场 visual-dps 一致。">?</button>
        </p>
      </div>
    </section>

    <section id="panel-playback" class="panel">
      <div class="playback-records-toolbar">
        <h2 class="playback-records-heading heading-with-tip">
          已保存记录
          <button type="button" class="field-tip" data-tip="单击一条记录选中，再点「加载并回放」；双击记录行可直接加载。右侧可进行下载、导出 Excel、标注或删除。">?</button>
        </h2>
        <button type="button" id="playback-load-record" class="primary-btn" disabled>加载并回放</button>
      </div>
      <ul id="session-list" class="session-list"></ul>

      <details class="playback-import-details">
        <summary>手动导入 JSON / 视频</summary>
        <div class="card playback-import-card">
          <label>
            <span class="label-with-tip">骨架 JSON
              <button type="button" class="field-tip" data-tip="手动导入 pose JSON 进行回放（无已保存记录时）。导入后可再选标注与视频。">?</button>
            </span>
            <input type="file" id="playback-json" accept=".json,application/json" />
          </label>
          <label>
            <span class="label-with-tip">标注 JSON（可选）
              <button type="button" class="field-tip" data-tip="若 pose JSON 内无 annotation.boxes，可在此补充货框标注，用于叠加货位与碰撞/告警计算。">?</button>
            </span>
            <input type="file" id="playback-annotation" accept=".json,application/json" />
          </label>
          <label>
            <span class="label-with-tip">替换视频（可选）
              <button type="button" class="field-tip" data-tip="记录无配套视频或需用本地文件替换时选择。不选则仅播放骨骼叠加。">?</button>
            </span>
            <input type="file" id="playback-video" accept="video/*" />
          </label>
        </div>
      </details>

      <div class="stage-wrap">
        <video id="playback-video-el" playsinline controls controlsList="nofullscreen" preload="metadata"></video>
        <canvas id="playback-canvas"></canvas>
      </div>
      <div class="playback-transport">
        <div class="controls">
          <button type="button" id="play-btn">播放</button>
          <button type="button" id="pause-btn">暂停</button>
          <button type="button" id="end-playback-btn">停止回放</button>
          <a id="playback-export-xlsx" class="btn-link hidden" href="#" download>导出 Excel</a>
          <span id="time-label">0:00</span>
        </div>
        <div class="seek-stack">
          <div id="seek-event-markers" class="seek-event-markers" aria-hidden="true"></div>
          <input type="range" id="seek-bar" min="0" max="1000" value="0" />
        </div>
        <div id="playback-events-panel" class="playback-events-panel hidden">
          <div class="playback-events-head">
            <strong>事件跳转</strong>
            <label class="event-filter-label">
              筛选
              <select id="event-filter">
                <option value="all">全部</option>
                <option value="alarm">告警</option>
                <option value="collision">碰撞</option>
              </select>
            </label>
            <span id="event-count-label" class="hint">—</span>
          </div>
          <ul id="event-jump-list" class="event-jump-list"></ul>
        </div>
      </div>
      <p id="playback-info" class="hint"></p>
    </section>
  </main>

  <script src="fieldTips.js"></script>
  <script src="previewLayout.js"></script>
  <script src="collectVideoPreview.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
  <script src="annotateGeometry.js"></script>
  <script src="annotateVisualMode.js"></script>
  <script src="app.js?v=21"></script>
  <script src="annotate.js?v=10"></script>
</body>
</html>
